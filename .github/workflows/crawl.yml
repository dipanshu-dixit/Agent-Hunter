name: Agent Crawl

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Restore database from snapshot
      run: python restore_snapshot.py

    - name: Start API server
      run: |
        uvicorn api.main:app --host 0.0.0.0 --port 8000 &
        echo "Waiting for API to be ready..."
        for i in {1..30}; do
          curl -s http://localhost:8000/health && echo "API ready!" && break
          echo "Attempt $i/30..."
          sleep 2
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run scan
      continue-on-error: true
      run: python -u run_scan.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    - name: Export JSON snapshot
      run: |
        python3 -c "
import json, sqlite3

conn = sqlite3.connect('agent_hunter.db')
conn.row_factory = sqlite3.Row
agents = [dict(r) for r in conn.execute('SELECT * FROM agentprofile').fetchall()]
for a in agents:
    if isinstance(a.get('capabilities'), str):
        try:
            a['capabilities'] = json.loads(a['capabilities'])
        except:
            a['capabilities'] = []
conn.close()

with open('agents_data.json', 'w') as f:
    json.dump(agents, f)

# stats
from collections import Counter
models = Counter(a.get('model_detected','unknown') for a in agents)
frameworks = Counter(a.get('framework','unknown') for a in agents)
types = Counter(a.get('agent_type','unknown') for a in agents)
stats = {'models': dict(models), 'frameworks': dict(frameworks), 'agent_types': dict(types)}
with open('stats_data.json', 'w') as f:
    json.dump(stats, f)

print(f'Exported {len(agents)} total agents to agents_data.json')
"

    - name: Commit snapshot
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "AgentHunter Bot"
        git add agents_data.json stats_data.json
        git diff --staged --quiet || git commit -m "chore: update agent snapshot [skip ci]"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
