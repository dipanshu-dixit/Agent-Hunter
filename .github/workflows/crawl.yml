name: Agent Crawl

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Restore database from snapshot
      continue-on-error: true
      run: python restore_snapshot.py

    - name: Start API server
      run: |
        uvicorn api.main:app --host 0.0.0.0 --port 8000 &
        echo "Waiting for API to be ready..."
        for i in {1..30}; do
          curl -s http://localhost:8000/health && echo "API ready!" && break
          echo "Attempt $i/30..."
          sleep 2
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run scan
      continue-on-error: true
      run: python -u run_scan.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_SHA: ${{ github.sha }}

    - name: Export JSON snapshot
      continue-on-error: true
      run: python3 export_snapshot.py

    - name: Commit and push snapshot
      continue-on-error: true
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "AgentHunter Bot"
        git fetch origin main
        git checkout origin/main -- . 2>/dev/null || true
        python3 export_snapshot.py
        git add agents_data.json stats_data.json src/streamlit_app.py upload_to_hf.py
        git diff --staged --quiet || git commit -m "chore: update agent snapshot [skip ci]"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Push dataset to HuggingFace Space
      continue-on-error: true
      run: |
        pip install huggingface_hub -q
        python3 upload_to_hf.py
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
