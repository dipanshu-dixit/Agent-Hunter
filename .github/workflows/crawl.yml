name: Agent Crawl

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Restore database from snapshot
      continue-on-error: true
      run: python restore_snapshot.py

    - name: Start API server
      run: |
        uvicorn api.main:app --host 0.0.0.0 --port 8000 &
        echo "Waiting for API to be ready..."
        for i in {1..30}; do
          curl -s http://localhost:8000/health && echo "API ready!" && break
          echo "Attempt $i/30..."
          sleep 2
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run scan
      continue-on-error: true
      run: python -u run_scan.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    - name: Export JSON snapshot
      continue-on-error: true
      run: python3 export_snapshot.py

    - name: Commit and push snapshot
      continue-on-error: true
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "AgentHunter Bot"
        git add agents_data.json stats_data.json
        git diff --staged --quiet && echo "No changes to commit" && exit 0

        git commit -m "chore: update agent snapshot [skip ci]"

        # Retry push up to 3 times with rebase to handle concurrent runs
        for i in 1 2 3; do
          git pull --rebase origin main && git push && echo "Push succeeded on attempt $i" && exit 0
          echo "Push attempt $i failed, retrying in 5s..."
          sleep 5
        done

        echo "All push attempts failed — snapshot committed locally but not pushed"
        exit 1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
