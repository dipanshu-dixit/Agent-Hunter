name: Agent Crawl

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Start API server
      run: |
        uvicorn api.main:app --host 0.0.0.0 --port 8000 &
        sleep 5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Run scan
      continue-on-error: true
      run: python -u run_scan.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Save database to repo
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "AgentHunter Bot"
        git add agent_hunter.db
        git diff --staged --quiet || git commit -m "chore: update database [skip ci]"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Echo summary
      run: |
        echo "Scan completed"
        curl -s http://localhost:8000/stats || echo "Stats unavailable"